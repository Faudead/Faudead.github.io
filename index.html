<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Wishlist</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 20px;
}

h1 { margin-bottom: 15px; }

/* controls */
.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

input, select {
  padding: 8px;
  border-radius: 8px;
  border: none;
}

/* grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}

/* CARD */
.card {
  background: #1e293b;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid #334155;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-4px);
  border-color: #3b82f6;
}

/* IMAGE — FIX (no crop) */
.card img {
  width: 100%;
  height: 180px;
  object-fit: contain;   /* 🔥 ключова зміна */
  background: #0b1220;
  padding: 10px;
}

/* CONTENT */
.content {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* labels */
.label {
  font-size: 11px;
  opacity: 0.6;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.value {
  font-size: 14px;
}

/* title */
.title {
  font-size: 18px;
  font-weight: bold;
}

/* price highlight */
.price {
  font-size: 18px;
  font-weight: bold;
  color: #34d399;
}

/* link */
a {
  color: #60a5fa;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<h1>Wishlist</h1>

<div class="controls">
  <input id="search" placeholder="Search...">

  <select id="category">
    <option value="all">All categories</option>
  </select>

  <select id="sort">
    <option value="none">Sort</option>
    <option value="asc">Price ↑</option>
    <option value="desc">Price ↓</option>
  </select>
</div>

<div class="grid" id="grid"></div>

<script>
const SHEET_ID = "1Wgs2XgmamRKgoEd_R4Z2tbOa21h8t6UjlslB62hAtYs";
const URL = `https://opensheet.elk.sh/${SHEET_ID}/Sheet1`;

let data = [];

fetch(URL)
  .then(r => r.json())
  .then(res => {
    data = res;

    setupFilters(data);
    render(data);
  });

function setupFilters(data) {
  const categories = [...new Set(data.map(i => i.category))];
  const cat = document.getElementById("category");

  categories.forEach(c => {
    cat.innerHTML += `<option value="${c}">${c}</option>`;
  });

  document.getElementById("search").addEventListener("input", applyFilters);
  document.getElementById("category").addEventListener("change", applyFilters);
  document.getElementById("sort").addEventListener("change", applyFilters);
}

function applyFilters() {
  let filtered = [...data];

  const search = document.getElementById("search").value.toLowerCase();
  const category = document.getElementById("category").value;
  const sort = document.getElementById("sort").value;

  if (search) {
    filtered = filtered.filter(i =>
      (i.title || "").toLowerCase().includes(search)
    );
  }

  if (category !== "all") {
    filtered = filtered.filter(i => i.category === category);
  }

  if (sort === "asc") {
    filtered.sort((a, b) => Number(a.price) - Number(b.price));
  }

  if (sort === "desc") {
    filtered.sort((a, b) => Number(b.price) - Number(a.price));
  }

  render(filtered);
}

function render(items) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  items.forEach(item => {
    grid.innerHTML += `
      <div class="card">

        <img src="${item.image || ''}">

        <div class="content">

          <div>
            <div class="label">Title</div>
            <div class="title">${item.title}</div>
          </div>

          <div>
            <div class="label">Category</div>
            <div class="value">${item.category}</div>
          </div>

          <div>
            <div class="label">Price</div>
            <div class="price">${item.price}</div>
          </div>

          <div>
            <div class="label">Link</div>
            <a href="${item.url}" target="_blank">open product</a>
          </div>

        </div>
      </div>
    `;
  });
}
</script>

</body>
</html>
