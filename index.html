<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Wishlist</title>

  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
    }

    h1 {
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #334155;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .content {
      padding: 16px;
    }

    .category {
      font-size: 12px;
      opacity: 0.7;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .price {
      color: #34d399;
      margin-bottom: 12px;
    }

    .btn {
      display: inline-block;
      padding: 10px 12px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }

    .btn:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>

<h1>My Wishlist</h1>

<div class="grid" id="grid"></div>

<script>
async function loadData() {
  const res = await fetch('./data.json');
  const data = await res.json();

  const grid = document.getElementById('grid');

  data.forEach(item => {
    grid.innerHTML += `
      <div class="card">
        <img src="${item.image}" />

        <div class="content">
          <div class="category">${item.category}</div>
          <div class="title">${item.title}</div>
          <div class="price">${item.price}</div>

          <a class="btn" href="${item.url}" target="_blank">
            Open
          </a>
        </div>
      </div>
    `;
  });
}

loadData();
</script>

</body>
</html>
