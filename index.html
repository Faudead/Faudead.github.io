<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Wishlist</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 20px;
}

h1 { margin-bottom: 10px; }

.controls {
  margin-bottom: 20px;
}

select {
  padding: 8px;
  border-radius: 8px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 15px;
}

.card {
  background: #1e293b;
  border-radius: 12px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  background: #111827;
}

.content {
  padding: 12px;
}

.title {
  font-size: 18px;
  font-weight: bold;
}

.price {
  color: #34d399;
  margin: 6px 0;
}

a {
  color: #60a5fa;
}
</style>
</head>

<body>

<h1>Wishlist</h1>

<div class="controls">
  <select id="filter">
    <option value="all">All</option>
  </select>
</div>

<div class="grid" id="grid"></div>

<script>
const SHEET_ID = "1Wgs2XgmamRKgoEd_R4Z2tbOa21h8t6UjlslB62hAtYs";
const URL = `https://opensheet.elk.sh/${SHEET_ID}/Sheet1`;

let allData = [];

fetch(URL)
  .then(r => r.json())
  .then(data => {
    allData = data;

    const categories = [...new Set(data.map(i => i.category))];

    const filter = document.getElementById("filter");

    categories.forEach(c => {
      filter.innerHTML += `<option value="${c}">${c}</option>`;
    });

    render(data);

    filter.addEventListener("change", (e) => {
      const val = e.target.value;

      if (val === "all") render(allData);
      else render(allData.filter(i => i.category === val));
    });
  });

function render(data) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach(item => {
    grid.innerHTML += `
      <div class="card">
        <img src="${item.image || ''}">
        <div class="content">
          <div>${item.category}</div>
          <div class="title">${item.title}</div>
          <div class="price">${item.price}</div>
          <a href="${item.url}" target="_blank">open</a>
        </div>
      </div>
    `;
  });
}
</script>

</body>
</html>
