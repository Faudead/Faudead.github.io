<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Wishlist</title>
</head>
<body>

<h1>Wishlist</h1>
<div id="app"></div>

<script>
const SHEET_ID = "1Wgs2XgmamRKgoEd_R4Z2tbOa21h8t6UjlslB62hAtYs";
const URL = `https://opensheet.elk.sh/${SHEET_ID}/Sheet1`;

fetch(URL)
  .then(r => r.json())
  .then(data => {
    const app = document.getElementById("app");

    data.forEach(item => {
      app.innerHTML += `
        <div style="border:1px solid #ccc; margin:10px; padding:10px;">
          <img src="${item.image}" width="200"/>
          <h3>${item.title}</h3>
          <p>${item.category}</p>
          <p>${item.price}</p>
          <a href="${item.url}" target="_blank">open</a>
        </div>
      `;
    });
  });
</script>

</body>
</html>
