<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Список бажань</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 16px;
  -webkit-tap-highlight-color: transparent;
}

h1 {
  margin-bottom: 12px;
}

/* controls */
.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

input, select {
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
}

/* grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}

/* card */
.card {
  background: #1e293b;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid #334155;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-3px);
  border-color: #3b82f6;
}

/* image */
.card img {
  width: 100%;
  height: 170px;
  object-fit: contain;
  background: #0b1220;
  padding: 10px;
}

/* content */
.content {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.label {
  font-size: 10px;
  opacity: 0.6;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.category {
  font-size: 13px;
  opacity: 0.8;
}

.title {
  font-size: 16px;
  font-weight: bold;
}

.price {
  font-size: 16px;
  font-weight: bold;
  color: #34d399;
}

a {
  color: #60a5fa;
  text-decoration: none;
  font-size: 14px;
}

/* button */
button {
  margin-top: 8px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: #2563eb;
  color: white;
  font-weight: bold;
}

button.bought {
  background: #16a34a;
}
</style>
</head>

<body>

<h1>Список бажань</h1>

<div class="controls">
  <input id="search" placeholder="Пошук...">

  <select id="category">
    <option value="all">Всі категорії</option>
  </select>

  <select id="sort">
    <option value="none">Сортування</option>
    <option value="asc">Ціна ↑ (дешевші)</option>
    <option value="desc">Ціна ↓ (дорожчі)</option>
  </select>
</div>

<div class="grid" id="grid"></div>

<script>
const SHEET_ID = "1Wgs2XgmamRKgoEd_R4Z2tbOa21h8t6UjlslB62hAtYs";
const URL = `https://opensheet.elk.sh/${SHEET_ID}/Sheet1`;

let data = [];
let bought = JSON.parse(localStorage.getItem("bought") || "{}");

fetch(URL)
  .then(r => r.json())
  .then(res => {
    data = res;

    setupFilters(data);
    render(data);
  });

function setupFilters(data) {
  const categories = [...new Set(data.map(i => i.category))];
  const cat = document.getElementById("category");

  categories.forEach(c => {
    cat.innerHTML += `<option value="${c}">${c}</option>`;
  });

  document.getElementById("search").addEventListener("input", applyFilters);
  document.getElementById("category").addEventListener("change", applyFilters);
  document.getElementById("sort").addEventListener("change", applyFilters);
}

function applyFilters() {
  let filtered = [...data];

  const search = document.getElementById("search").value.toLowerCase();
  const category = document.getElementById("category").value;
  const sort = document.getElementById("sort").value;

  if (search) {
    filtered = filtered.filter(i =>
      (i.title || "").toLowerCase().includes(search)
    );
  }

  if (category !== "all") {
    filtered = filtered.filter(i => i.category === category);
  }

  if (sort === "asc") {
    filtered.sort((a, b) => Number(a.price) - Number(b.price));
  }

  if (sort === "desc") {
    filtered.sort((a, b) => Number(b.price) - Number(a.price));
  }

  render(filtered);
}

function toggleBought(title) {
  bought[title] = !bought[title];
  localStorage.setItem("bought", JSON.stringify(bought));
  render(data);
}

function render(items) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  items.forEach(item => {
    const isBought = bought[item.title];

    grid.innerHTML += `
      <div class="card">

        <img src="${item.image || ''}">

        <div class="content">

          <div class="label">Категорія</div>
          <div class="category">${item.category}</div>

          <div class="label">Назва</div>
          <div class="title">${item.title}</div>

          <div class="label">Ціна</div>
          <div class="price">${item.price}</div>

          <div class="label">Посилання</div>
          <a href="${item.url}" target="_blank">відкрити товар</a>

          <button class="${isBought ? 'bought' : ''}"
                  onclick="toggleBought('${item.title}')">
            ${isBought ? '✔ Куплено' : 'Позначити як куплено'}
          </button>

        </div>
      </div>
    `;
  });
}
</script>

</body>
</html>
